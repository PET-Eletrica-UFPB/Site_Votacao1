<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #02337d; 
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    width: 100vw;
    overflow-x: hidden;
  }

  /* 🔄 GERENCIADOR DE SLIDES (MODO TV VERTICAL 9:16) */
  .slide {
    display: none;
    width: 100vw;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 20px 15px;
    animation: fadeIn 0.8s ease-in-out;
  }

  .slide.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.99); }
    to { opacity: 1; transform: scale(1); }
  }

  /* 🗺️ SLIDE 1: PLANTA VERTICAL DA FEIRA */
  #slide-planta {
    padding: 0;
    margin: 0;
    background-color: #02337d;
    height: 100vh;
    justify-content: center;
  }

  .planta-img {
    width: 100vw;
    height: 100vh;
    object-fit: contain; /* Garante que a planta apareça inteira sem cortes */
    display: block;
  }

  /* 🟢 SLIDE 2: RANKING / VOTAÇÃO VERTICAL */
  header {
    text-align: center;
    margin-bottom: 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  header h1 {
    font-size: 2rem;
    letter-spacing: 1px;
    color: #ffffff;
    text-transform: uppercase;
    line-height: 1.2;
    margin-bottom: 5px;
  }

  header p {
    font-size: 1rem;
    color: #94a3b8;
    text-transform: uppercase;
  }

  .logos-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 12px;
    width: 100%;
  }

  .logos-container img {
    height: 45px;
    width: auto;
    object-fit: contain;
  }

  /* 📦 CONTAINER DOS CARDS (EMPILHADOS NA VERTICAL) */
  .container {
    display: flex;
    flex-direction: column; /* Coloca uma caixa embaixo da outra */
    align-items: center;
    gap: 15px;
    width: 100%;
    max-width: 600px; /* Largura ideal para TV Vertical */
    margin: 10px 0;
  }

  .card {
    background: #61AF49;
    border: 1px solid #61AF49;
    border-radius: 16px;
    padding: 15px 20px;
    width: 100%;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
  }

  .card h2 {
    font-size: 1.4rem;
    color: #f8fafc;
    border-bottom: 2px solid #334155;
    padding-bottom: 8px;
    margin-bottom: 12px;
    text-align: center;
  }

  ol {
    list-style: none;
  }

  li {
    background: #0f172a;
    border: 1px solid #334155;
    margin-bottom: 8px;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
  }

  li:first-child {
    border-color: #f59e0b;
    background: linear-gradient(135deg, #1e293b 0%, #291e11 100%);
  }

  .pos {
    font-weight: 800;
    font-size: 1.2rem;
    margin-right: 10px;
    min-width: 35px;
  }

  .pos-1 { color: #f59e0b; }
  .pos-2 { color: #94a3b8; }
  .pos-3 { color: #b45309; }

  .nome-projeto {
    font-weight: 600;
    color: #f1f5f9;
    word-break: break-word;
  }

  footer {
    width: 100%;
    max-width: 600px;
    text-align: center;
    margin-top: 10px;
  }

  #total-votos {
    background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
    color: #ffffff;
    font-size: 1.5rem;
    font-weight: 700;
    padding: 14px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
  }
</style>
</head>
<body>

  <div id="slide-planta" class="slide active">
    <img src="https://raw.githubusercontent.com/PET-Eletrica-UFPB/Site_Votacao1/refs/heads/main/plantavertical.png" class="planta-img" alt="Planta da Feira Vertical">
  </div>

  <div id="slide-ranking" class="slide">
    <header>
      <h1>Feira de Engenharia e Energias 2026.1</h1>
      <p>RANKING AO VIVO - MOSTRA DE PROJETOS</p>

      <div class="logos-container">
        <img src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/cear.png?raw=true" alt="Logo CEAR">
        <img src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/ufpb.png?raw=true" alt="Logo UFPB">
        <img src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/pet.png?raw=true" alt="Logo PET">
      </div>
    </header>

    <div class="container">
      <div class="card">
        <h2>Engenharia Elétrica</h2>
        <ol id="top-eletrica">
          <li>Aguardando conexão...</li>
        </ol>
      </div>

      <div class="card">
        <h2>Engenharia de Energias Renováveis</h2>
        <ol id="top-renovaveis">
          <li>Aguardando conexão...</li>
        </ol>
      </div>
    </div>

    <footer>
      <div id="total-votos">Total de Votos Registrados: 0</div>
    </footer>
  </div>

  <script>
    const tempoPlantaSegundos = 10; // 10 segundos na Planta
    const tempoRankingSegundos = 5;  // 5 segundos no Ranking

    const slidePlanta = document.getElementById('slide-planta');
    const slideRanking = document.getElementById('slide-ranking');

    function alternarParaRanking() {
      slidePlanta.classList.remove('active');
      slideRanking.classList.add('active');
      setTimeout(alternarParaPlanta, tempoRankingSegundos * 1000);
    }

    function alternarParaPlanta() {
      slideRanking.classList.remove('active');
      slidePlanta.classList.add('active');
      setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
    }

    setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // ⚠️ Substitua pelas suas credenciais do Firebase Console
    const firebaseConfig = {
      apiKey: "SUA_API_KEY_AQUI",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function obterTop3(projetosObjeto, sufixo) {
      if (!projetosObjeto) return [];

      const lista = Object.keys(projetosObjeto).map(key => ({
        numero: key,
        ...projetosObjeto[key]
      }));

      lista.sort((a, b) => {
        const votosA = a.votos || 0;
        const votosB = b.votos || 0;

        if (votosB !== votosA) {
          return votosB - votosA;
        }

        const ordemA = a.ordemAtingida || 0;
        const ordemB = b.ordemBtingida || 0;

        return ordemA - ordemB;
      });

      return lista.slice(0, 3).map(p => `${p.numero}${sufixo} - ${p.nome}`);
    }

    onValue(ref(db, '/'), (snapshot) => {
      const data = snapshot.val() || {};

      const eletricaTop3 = obterTop3(data.eletrica, 'A');
      const renovaveisTop3 = obterTop3(data.renovaveis, 'B');

      let totalVotos = 0;
      if (data.eletrica) {
        Object.values(data.eletrica).forEach(p => totalVotos += (p.votos || 0));
      }
      if (data.renovaveis) {
        Object.values(data.renovaveis).forEach(p => totalVotos += (p.votos || 0));
      }

      const elList = document.getElementById('top-eletrica');
      if (eletricaTop3.length > 0) {
        elList.innerHTML = eletricaTop3.map((p, i) => `
          <li>
            <span class="pos pos-${i+1}">${i+1}º</span>
            <span class="nome-projeto">${p}</span>
          </li>
        `).join('');
      } else {
        elList.innerHTML = '<li>Nenhum voto registrado</li>';
      }

      const renList = document.getElementById('top-renovaveis');
      if (renovaveisTop3.length > 0) {
        renList.innerHTML = renovaveisTop3.map((p, i) => `
          <li>
            <span class="pos pos-${i+1}">${i+1}º</span>
            <span class="nome-projeto">${p}</span>
          </li>
        `).join('');
      } else {
        renList.innerHTML = '<li>Nenhum voto registrado</li>';
      }

      document.getElementById('total-votos').innerText = `Total de Votos Registrados: ${totalVotos}`;
    });
  </script>
</body>
</html>
