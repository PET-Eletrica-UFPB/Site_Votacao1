<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #02337d; 
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100vh;
    padding: 20px;
  }

  /* 🔄 REGRAS DAS TELAS / SLIDES */
  .slide {
    display: none; /* Esconde todas as telas por padrão */
    width: 100%;
    max-width: 1200px;
    flex-direction: column;
    align-items: center;
    animation: fadeIn 0.8s ease-in-out;
  }

  .slide.active {
    display: flex; /* Exibe apenas a tela ativa */
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
  }

  /* 🗺️ ESTILO DA TELA DA PLANTA DA FEIRA */
  #slide-planta h2 {
    font-size: 2.2rem;
    margin-bottom: 15px;
    text-transform: uppercase;
    text-align: center;
  }

  .planta-img {
    max-width: 100%;
    max-height: 75vh;
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    object-fit: contain;
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header h1 {
    font-size: 2.5rem;
    letter-spacing: 2px;
    color: #ffffff;
    text-transform: uppercase;
  }

  header p {
    font-size: 1.1rem;
    color: #94a3b8;
    text-transform: uppercase;
  }

  /* 🖼️ ESTILO DO CONTAINER DE LOGOS */
  .logos-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 15px;
    flex-wrap: wrap;
  }

  .logos-container img {
    height: 60px;
    width: auto;
    object-fit: contain;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    flex-direction: row; 
    flex-wrap: wrap;
  }

  /* 📱 REGRA PARA TELA VERTICAL (Orientação Portrait) */
  @media (max-width: 768px), (orientation: portrait) {
    .container {
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 100% !important;
    }

    header h1 {
      font-size: 2rem;
    }

    #total-votos {
      font-size: 1.6rem !important;
    }

    .logos-container img {
      height: 45px;
    }
  }

  .card {
    background: #61AF49;
    border: 1px solid #61AF49;
    border-radius: 16px;
    padding: 20px;
    flex: 1;
    min-width: 280px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
  }

  .card h2 {
    font-size: 1.6rem;
    color: #f8fafc;
    border-bottom: 2px solid #334155;
    padding-bottom: 10px;
    margin-bottom: 15px;
    text-align: center;
  }

  ol {
    list-style: none;
  }

  li {
    background: #0f172a;
    border: 1px solid #334155;
    margin-bottom: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
  }

  li:first-child {
    border-color: #f59e0b;
    background: linear-gradient(135deg, #1e293b 0%, #291e11 100%);
  }

  .pos {
    font-weight: 800;
    font-size: 1.4rem;
    margin-right: 12px;
    min-width: 40px;
  }

  .pos-1 { color: #f59e0b; }
  .pos-2 { color: #94a3b8; }
  .pos-3 { color: #b45309; }

  .nome-projeto {
    font-weight: 600;
    color: #f1f5f9;
    word-break: break-word;
  }

  footer {
    width: 100%;
    max-width: 1200px;
    margin-top: 20px;
    text-align: center;
  }

  #total-votos {
    background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
    color: #ffffff;
    font-size: 2rem;
    font-weight: 700;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
  }
</style>
</head>
<body>

  <div id="slide-planta" class="slide active">
    <h2>Planta do Evento - FEE 2026.1</h2>
    <img src="planta.png" class="planta-img" alt="Planta da Feira">
  </div>

  <div id="slide-ranking" class="slide">
    <header>
      <h1>Feira de Engenharia e Energias 2026.1 - RANKING AO VIVO</h1>
      <p>MOSTRA DE PROJETOS - FEE 2026.1</p>

      <div class="logos-container">
        <img src="cear.png" alt="Logo 1">
        <img src="ufpb.png" alt="Logo 2">
        <img src="pet.png" alt="Logo 3">
      </div>
    </header>

    <div class="container">
      <div class="card">
        <h2>Engenharia Elétrica</h2>
        <ol id="top-eletrica">
          <li>Aguardando conexão...</li>
        </ol>
      </div>

      <div class="card">
        <h2>Engenharia de Energias Renováveis</h2>
        <ol id="top-renovaveis">
          <li>Aguardando conexão...</li>
        </ol>
      </div>
    </div>
  </div>

  <footer>
    <div id="total-votos">Total de Votos Registrados: 0</div>
  </footer>

  <script>
    // Configuração dos tempos em segundos
    const tempoPlantaSegundos = 600;  // 10 minutos para a Planta
    const tempoRankingSegundos = 300;  // 5 minutos para o Ranking

    const slideRanking = document.getElementById('slide-ranking');
    const slidePlanta = document.getElementById('slide-planta');

    function mostrarPlanta() {
      slideRanking.classList.remove('active');
      slidePlanta.classList.add('active');
      // Aguarda 10 minutos na planta e depois muda para o ranking
      setTimeout(mostrarRanking, tempoPlantaSegundos * 1000);
    }

    function mostrarRanking() {
      slidePlanta.classList.remove('active');
      slideRanking.classList.add('active');
      // Aguarda 5 minutos no ranking e depois volta para a planta
      setTimeout(mostrarPlanta, tempoRankingSegundos * 1000);
    }

    // Inicia a exibição pela planta
    mostrarPlanta();
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "SUA_API_KEY_AQUI",
      authDomain: "SEU_PROJETO.firebaseapp.com",
      databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
      projectId: "SEU_PROJETO",
      storageBucket: "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_SENDER_ID",
      appId: "SEU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function obterTop3(projetosObjeto, sufixo) {
      if (!projetosObjeto) return [];

      const lista = Object.keys(projetosObjeto).map(key => ({
        numero: key,
        ...projetosObjeto[key]
      }));

      lista.sort((a, b) => {
        const votosA = a.votos || 0;
        const votosB = b.votos || 0;

        if (votosB !== votosA) {
          return votosB - votosA;
        }

        const ordemA = a.ordemAtingida || 0;
        const ordemB = b.ordemBtingida || 0;

        return ordemA - ordemB;
      });

      return lista.slice(0, 3).map(p => `${p.numero}${sufixo} - ${p.nome}`);
    }

    onValue(ref(db, '/'), (snapshot) => {
      const data = snapshot.val() || {};

      const eletricaTop3 = obterTop3(data.eletrica, 'A');
      const renovaveisTop3 = obterTop3(data.renovaveis, 'B');

      let totalVotos = 0;
      if (data.eletrica) {
        Object.values(data.eletrica).forEach(p => totalVotos += (p.votos || 0));
      }
      if (data.renovaveis) {
        Object.values(data.renovaveis).forEach(p => totalVotos += (p.votos || 0));
      }

      const elList = document.getElementById('top-eletrica');
      if (eletricaTop3.length > 0) {
        elList.innerHTML = eletricaTop3.map((p, i) => `
          <li>
            <span class="pos pos-${i+1}">${i+1}º</span>
            <span class="nome-projeto">${p}</span>
          </li>
        `).join('');
      } else {
        elList.innerHTML = '<li>Nenhum voto registrado</li>';
      }

      const renList = document.getElementById('top-renovaveis');
      if (renovaveisTop3.length > 0) {
        renList.innerHTML = renovaveisTop3.map((p, i) => `
          <li>
            <span class="pos pos-${i+1}">${i+1}º</span>
            <span class="nome-projeto">${p}</span>
          </li>
        `).join('');
      } else {
        renList.innerHTML = '<li>Nenhum voto registrado</li>';
      }

      document.getElementById('total-votos').innerText = `Total de Votos Registrados: ${totalVotos}`;
    });
  </script>
</body>
</html>
