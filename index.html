<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #BCE4E4;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* GERENCIADOR DE SLIDES */
    .slide {
      display: none;
      width: 100vw;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 15px 10px;
      animation: fadeIn 0.8s ease-in-out;
    }

    .slide.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.99);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* SLIDE 1: PLANTA VERTICAL DA FEIRA */
    #slide-planta {
      padding: 0;
      margin: 0;
      background-color: #BCE4E4;
      justify-content: center;
    }

    .planta-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    /* SLIDE 2: RANKING / VOTAÇÃO VERTICAL */
    header {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    header h1 {
      font-size: 1.3rem;
      letter-spacing: 1px;
      color: #273C7B;
      text-transform: uppercase;
      line-height: 1.2;
    }

    header p {
      font-size: 0.85rem;
      color: #1E232E;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .logos-container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 8px;
      width: 100%;
    }

    .logos-container img {
      height: 35px;
      width: auto;
      object-fit: contain;
    }

    /* CONTAINER DOS CARDS */
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      max-width: 500px;
      flex: 1;
      margin: 10px 0;
    }

    .card {
      background: #61AF49;
      border: 1px solid #61AF49;
      border-radius: 14px;
      padding: 10px 14px;
      width: 100%;
      box-shadow: 0 8px 20px rgba(97, 175, 73, 1);;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #ffffff;
      border-bottom: 2px solid #ffffff;
      padding-bottom: 4px;
      margin-bottom: 8px;
      text-align: center;
    }

    ol {
      list-style: none;
    }

    li {
      background: #61AF49;
      border: 1px solid #61AF49;
      margin-bottom: 6px;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
    }

    li:first-child {
      border-color: #f59e0b;
      background: linear-gradient(135deg, #1e293b 0%, #291e11 100%);
    }

    .pos {
      font-weight: 800;
      font-size: 1.1rem;
      margin-right: 8px;
      min-width: 30px;
    }

    .pos-1 {
      color: #f59e0b;
    }

    .pos-2 {
      color: #94a3b8;
    }

    .pos-3 {
      color: #b45309;
    }

    .nome-projeto {
      font-weight: 600;
      color: #f1f5f9;
      word-break: break-word;
    }

    footer {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    #status-ranking {
      background: #429c42;
      color: #ffffff;
      font-size: 1.05rem;
      font-weight: 700;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
    }
  </style>
</head>

<body>

  <div id="slide-planta" class="slide active">
    <img
      src="https://raw.githubusercontent.com/PET-Eletrica-UFPB/Site_Votacao1/refs/heads/main/plantavertical.png"
      class="planta-img"
      alt="Planta da Feira Vertical"
    >
  </div>

  <div id="slide-ranking" class="slide">
    <header>
      <h1>Feira de Engenharia e Energias 2026.1</h1>
      <p>RANKING AO VIVO - MOSTRA DE PROJETOS</p>

      <div class="logos-container">
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/cear.png?raw=true"
          alt="Logo CEAR"
        >
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/ufpb.png?raw=true"
          alt="Logo UFPB"
        >
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/pet.png?raw=true"
          alt="Logo PET"
        >
      </div>
    </header>

    <div class="container">
      <div class="card">
        <h2>Engenharia Elétrica</h2>
        <ol id="top-eletrica">
          <li>Aguardando conexão...</li>
        </ol>
      </div>

      <div class="card">
        <h2>Engenharia de Energias Renováveis</h2>
        <ol id="top-renovaveis">
          <li>Aguardando conexão...</li>
        </ol>
      </div>
    </div>

    <footer>
      <div id="status-ranking">Ranking atualizado em tempo real</div>
    </footer>
  </div>

  <script>
    const tempoPlantaSegundos = 10;
    const tempoRankingSegundos = 5;

    const slidePlanta = document.getElementById('slide-planta');
    const slideRanking = document.getElementById('slide-ranking');

    function alternarParaRanking() {
      slidePlanta.classList.remove('active');
      slideRanking.classList.add('active');
      setTimeout(alternarParaPlanta, tempoRankingSegundos * 1000);
    }

    function alternarParaPlanta() {
      slideRanking.classList.remove('active');
      slidePlanta.classList.add('active');
      setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
    }

    setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // Firebase - FEE 2026.1
    // A chave de API identifica o projeto; o acesso aos dados continua
    // controlado pelas regras do Realtime Database.
    const firebaseConfig = {
      apiKey: "AIzaSyA27dn6kUmDD_AtaKixZsFK-zE2DMfETP4",
      authDomain: "fee20261.firebaseapp.com",
      databaseURL: "https://fee20261-default-rtdb.firebaseio.com",
      projectId: "fee20261"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // O site lê SOMENTE o caminho público liberado nas regras.
    const rankingRef = ref(
      db,
      "urna/ranking_publico"
    );

    function escaparHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function atualizarRanking(elementoId, ranking) {
      const lista = document.getElementById(elementoId);

      if (!ranking) {
        lista.innerHTML = "<li>Nenhum voto registrado</li>";
        return;
      }

      let html = "";

      for (let posicao = 1; posicao <= 3; posicao++) {
        const projeto = ranking[String(posicao)];

        if (!projeto) {
          continue;
        }

        const nome = escaparHTML(projeto.nome);

        html += `
          <li>
            <span class="pos pos-${posicao}">${posicao}º</span>
            <span class="nome-projeto">${nome}</span>
          </li>
        `;
      }

      lista.innerHTML =
        html || "<li>Nenhum voto registrado</li>";
    }

    onValue(
      rankingRef,

      (snapshot) => {
        const ranking = snapshot.val();

        console.log(
          "Ranking recebido do Firebase:",
          ranking
        );

        if (!ranking) {
          document.getElementById(
            "top-eletrica"
          ).innerHTML =
            "<li>Nenhum voto registrado</li>";

          document.getElementById(
            "top-renovaveis"
          ).innerHTML =
            "<li>Nenhum voto registrado</li>";

          document.getElementById(
            "status-ranking"
          ).innerText =
            "Aguardando os primeiros votos";

          return;
        }

        atualizarRanking(
          "top-eletrica",
          ranking.eletrica
        );

        atualizarRanking(
          "top-renovaveis",
          ranking.renovaveis
        );

        document.getElementById(
          "status-ranking"
        ).innerText =
          "Ranking atualizado em tempo real";
      },

      (erro) => {
        console.error(
          "Erro ao ler ranking:",
          erro
        );

        document.getElementById(
          "top-eletrica"
        ).innerHTML =
          "<li>Erro de conexão</li>";

        document.getElementById(
          "top-renovaveis"
        ).innerHTML =
          "<li>Erro de conexão</li>";

        document.getElementById(
          "status-ranking"
        ).innerText =
          "Sem conexão com o ranking";
      }
    );
  </script>

</body>
</html>
