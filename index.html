<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #02337d; 
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
    overflow: hidden; /* Evita barras de rolagem em telas de TV */
  }

  /* 🔄 REGRAS DAS TELAS / SLIDES */
  .slide {
    display: none; /* Esconde todas as telas por padrão */
    width: 100%;
    max-width: 1400px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.8s ease-in-out;
  }

  .slide.active {
    display: flex; /* Exibe apenas a tela ativa */
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
  }

  /* 🗺️ ESTILO DA TELA DA PLANTA DA FEIRA (OTIMIZADO PARA TV) */
  #slide-planta {
    max-width: 100vw;
    height: 100vh;
    justify-content: center;
  }

  #slide-planta h2 {
    font-size: 2.2rem;
    margin-bottom: 10px;
    text-transform: uppercase;
    text-align: center;
  }

  .planta-img {
    width: auto;
    height: 88vh; /* Ocupa praticamente toda a altura da TV */
    max-width: 98vw;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    object-fit: contain; /* Garante que a imagem preencha verticalmente sem distorcer */
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header h1 {
    font-size: 2.5rem;
    letter-spacing: 2px;
    color: #ffffff;
    text-transform: uppercase;
  }

  header p {
    font-size: 1.1rem;
    color: #94a3b8;
    text-transform: uppercase;
  }

  /* 🖼️ ESTILO DO CONTAINER DE LOGOS */
  .logos-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 15px;
    flex-wrap: wrap;
  }

  .logos-container img {
    height: 60px;
    width: auto;
    object-fit: contain;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    flex-direction: row; 
    flex-wrap: wrap;
  }

  /* 📱 REGRA PARA TELA VERTICAL (Orientação Portrait) */
  @media (max-width: 768px), (orientation: portrait) {
    .container {
      flex-direction: column;
      align-items: center;
    }
