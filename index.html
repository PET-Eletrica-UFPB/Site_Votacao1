<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #EDF8F8;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* GERENCIADOR DE SLIDES */
    .slide {
      display: none;
      width: 100vw;
      height: 100vh;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 15px 10px;
      animation: fadeIn 0.8s ease-in-out;
    }

    .slide.active {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.99);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* SLIDE 1: PLANTA VERTICAL DA FEIRA */
    #slide-planta {
      padding: 0;
      margin: 0;
      background-color: #EDF8F8;
      justify-content: center;
    }

    .planta-img {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    /* SLIDE 2: RANKING / VOTAÇÃO VERTICAL */
#slide-ranking {
  background-color: #EDF8F8;
  padding: 3vh 4vw;
  justify-content: space-between;
}

header {
  width: 100%;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex-shrink: 0;
}

header h1 {
  font-size: clamp(2.5rem, 5vw, 5.5rem);
  letter-spacing: 0.08em;
  color: #273C7B;
  text-transform: uppercase;
  line-height: 1.1;
  max-width: 95vw;
}

header p {
  font-size: clamp(1.3rem, 2.8vw, 3rem);
  font-weight: 600;
  color: #1E232E;
  text-transform: uppercase;
  margin-top: 1vh;
  letter-spacing: 0.04em;
}

.logos-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: clamp(25px, 4vw, 70px);
  margin-top: 2vh;
  width: 100%;
}

.logos-container img {
  height: clamp(70px, 7vh, 150px);
  max-width: 25vw;
  width: auto;
  object-fit: contain;
}

/* CONTAINER DOS CARDS */
.container {
  width: 92vw;
  max-width: 1400px;
  flex: 1;

  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: center;

  gap: 2.5vh;
  margin: 2.5vh 0;
  min-height: 0;
}

.card {
  width: 100%;
  flex: 1;

  display: flex;
  flex-direction: column;
  justify-content: center;

  background: #399C4C;
  border: clamp(2px, 0.2vw, 5px) solid #005636;
  border-radius: clamp(22px, 2vw, 40px);

  padding: 2vh 2.5vw;

  box-shadow:
    0 1.2vh 2.5vh rgba(0, 86, 54, 0.35);
}

.card h2 {
  font-size: clamp(2rem, 3.8vw, 4rem);
  line-height: 1.15;
  color: #ffffff;
  border-bottom: clamp(3px, 0.3vw, 6px) solid #005636;
  padding-bottom: 1vh;
  margin-bottom: 1.5vh;
  text-align: center;
}

ol {
  list-style: none;
  width: 100%;

  display: flex;
  flex-direction: column;
  gap: 1vh;
}

li {
  width: 100%;
  min-height: 6.5vh;

  background: linear-gradient(
    135deg,
    #399C4C 0%,
    #005636 100%
  );

  border: clamp(2px, 0.2vw, 4px) solid #005636;
  border-radius: clamp(16px, 1.5vw, 30px);

  padding: 1.2vh 2vw;

  font-size: clamp(1.6rem, 3vw, 3.2rem);

  display: flex;
  align-items: center;
}

li:first-child {
  border-color: #F7A42B;
  border-width: clamp(3px, 0.3vw, 6px);

  background: linear-gradient(
    135deg,
    #48B85E 0%,
    #005636 100%
  );

  box-shadow:
    0 0.5vh 1.5vh rgba(247, 164, 43, 0.35);
}

.pos {
  font-weight: 800;
  font-size: clamp(2rem, 3.7vw, 4rem);
  margin-right: 2vw;
  min-width: clamp(70px, 10vw, 150px);
  text-align: center;
}

.pos-1,
.pos-2,
.pos-3 {
  color: #ffffff;
}

.nome-projeto {
  flex: 1;
  font-weight: 600;
  color: #ffffff;
  line-height: 1.15;
  word-break: break-word;
}

footer {
  width: 92vw;
  max-width: 1400px;
  text-align: center;
  flex-shrink: 0;
}

#status-ranking {
  width: 100%;

  background: #F7A42B;
  color: #ffffff;

  font-size: clamp(1.5rem, 2.8vw, 3rem);
  font-weight: 700;

  padding: 1.5vh 2vw;
  border-radius: clamp(18px, 1.5vw, 30px);

  box-shadow:
    0 0.6vh 1.5vh rgba(247, 164, 43, 0.35);
}
  </style>
</head>

<body>

  <div id="slide-planta" class="slide active">
    <img
      src="https://raw.githubusercontent.com/PET-Eletrica-UFPB/Site_Votacao1/refs/heads/main/plantavertical.png"
      class="planta-img"
      alt="Planta da Feira Vertical"
    >
  </div>

  <div id="slide-ranking" class="slide">
    <header>
      <h1>Feira de Engenharia e Energias 2026.1</h1>
      <p>RANKING AO VIVO - MOSTRA DE PROJETOS</p>

      <div class="logos-container">
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/cear.png?raw=true"
          alt="Logo CEAR"
        >
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/ufpb.png?raw=true"
          alt="Logo UFPB"
        >
        <img
          src="https://github.com/PET-Eletrica-UFPB/Site_Votacao1/blob/main/pet.png?raw=true"
          alt="Logo PET"
        >
      </div>
    </header>

    <div class="container">
      <div class="card">
        <h2>Engenharia Elétrica</h2>
        <ol id="top-eletrica">
          <li>Aguardando conexão...</li>
        </ol>
      </div>

      <div class="card">
        <h2>Engenharia de Energias Renováveis</h2>
        <ol id="top-renovaveis">
          <li>Aguardando conexão...</li>
        </ol>
      </div>
    </div>

    <footer>
      <div id="status-ranking">Ranking atualizado em tempo real</div>
    </footer>
  </div>

  <script>
    const tempoPlantaSegundos = 10;
    const tempoRankingSegundos = 5;

    const slidePlanta = document.getElementById('slide-planta');
    const slideRanking = document.getElementById('slide-ranking');

    function alternarParaRanking() {
      slidePlanta.classList.remove('active');
      slideRanking.classList.add('active');
      setTimeout(alternarParaPlanta, tempoRankingSegundos * 1000);
    }

    function alternarParaPlanta() {
      slideRanking.classList.remove('active');
      slidePlanta.classList.add('active');
      setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
    }

    setTimeout(alternarParaRanking, tempoPlantaSegundos * 1000);
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import {
      getDatabase,
      ref,
      onValue
    } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    // Firebase - FEE 2026.1
    // A chave de API identifica o projeto; o acesso aos dados continua
    // controlado pelas regras do Realtime Database.
    const firebaseConfig = {
      apiKey: "AIzaSyA27dn6kUmDD_AtaKixZsFK-zE2DMfETP4",
      authDomain: "fee20261.firebaseapp.com",
      databaseURL: "https://fee20261-default-rtdb.firebaseio.com",
      projectId: "fee20261"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // O site lê SOMENTE o caminho público liberado nas regras.
    const rankingRef = ref(
      db,
      "urna/ranking_publico"
    );

    function escaparHTML(valor) {
      return String(valor ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function atualizarRanking(elementoId, ranking) {
      const lista = document.getElementById(elementoId);

      if (!ranking) {
        lista.innerHTML = "<li>Nenhum voto registrado</li>";
        return;
      }

      let html = "";

      for (let posicao = 1; posicao <= 3; posicao++) {
        const projeto = ranking[String(posicao)];

        if (!projeto) {
          continue;
        }

        const nome = escaparHTML(projeto.nome);

        html += `
          <li>
            <span class="pos pos-${posicao}">${posicao}º</span>
            <span class="nome-projeto">${nome}</span>
          </li>
        `;
      }

      lista.innerHTML =
        html || "<li>Nenhum voto registrado</li>";
    }

    onValue(
      rankingRef,

      (snapshot) => {
        const ranking = snapshot.val();

        console.log(
          "Ranking recebido do Firebase:",
          ranking
        );

        if (!ranking) {
          document.getElementById(
            "top-eletrica"
          ).innerHTML =
            "<li>Nenhum voto registrado</li>";

          document.getElementById(
            "top-renovaveis"
          ).innerHTML =
            "<li>Nenhum voto registrado</li>";

          document.getElementById(
            "status-ranking"
          ).innerText =
            "Aguardando os primeiros votos";

          return;
        }

        atualizarRanking(
          "top-eletrica",
          ranking.eletrica
        );

        atualizarRanking(
          "top-renovaveis",
          ranking.renovaveis
        );

        document.getElementById(
          "status-ranking"
        ).innerText =
          "Ranking atualizado em tempo real";
      },

      (erro) => {
        console.error(
          "Erro ao ler ranking:",
          erro
        );

        document.getElementById(
          "top-eletrica"
        ).innerHTML =
          "<li>Erro de conexão</li>";

        document.getElementById(
          "top-renovaveis"
        ).innerHTML =
          "<li>Erro de conexão</li>";

        document.getElementById(
          "status-ranking"
        ).innerText =
          "Sem conexão com o ranking";
      }
    );
  </script>

</body>
</html>
