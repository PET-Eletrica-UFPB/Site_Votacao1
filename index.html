<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ranking ao Vivo - Votação FEE 2026.1</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

  <style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: #02337d; 
    color: #f8fafc;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 10px;
    overflow: hidden; /* Evita rolagem na TV */
  }

  /* 🔄 REGRAS DAS TELAS / SLIDES */
  .slide {
    display: none; /* Esconde todas as telas por padrão */
    width: 100%;
    max-width: 1400px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.8s ease-in-out;
  }

  .slide.active {
    display: flex; /* Exibe apenas a tela ativa */
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.98); }
    to { opacity: 1; transform: scale(1); }
  }

  /* 🗺️ ESTILO DA TELA DA PLANTA DA FEIRA (AJUSTADO VERTICALMENTE) */
  #slide-planta {
    width: 100vw;
    height: 98vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  #slide-planta.active {
    display: flex;
  }

  #slide-planta h2 {
    font-size: 1.8rem;
    margin-bottom: 8px;
    text-transform: uppercase;
    text-align: center;
  }

  .planta-img {
    height: 85vh; /* Ocupa 85% da altura vertical da tela */
    width: auto;
    max-width: 95vw;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
    object-fit: contain; /* Mantém a proporção exata sem distorcer */
  }

  header {
    text-align: center;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header h1 {
    font-size: 2.5rem;
    letter-spacing: 2px;
    color: #ffffff;
    text-transform: uppercase;
  }

  header p {
    font-size: 1.1rem;
    color: #94a3b8;
    text-transform: uppercase;
  }

  /* 🖼️ ESTILO DO CONTAINER DE LOGOS */
  .logos-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    margin-top: 15px;
    flex-wrap: wrap;
  }

  .logos-container img {
    height: 60px;
    width: auto;
    object-fit: contain;
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1200px;
    flex-direction: row; 
    flex-wrap: wrap;
  }

  /* 📱 REGRA PARA TELA VERTICAL (Orientação Portrait) */
  @media (max-width: 768px), (orientation: portrait) {
    .container {
      flex-direction: column;
      align-items: center;
    }

    .card {
      width: 100% !important;
    }

    header h1 {
      font-size: 2rem;
    }

    #total-votos {
      font-size: 1.6rem !important;
    }

    .logos-container img {
      height: 45px;
    }
  }

  .card {
    background: #61AF49;
    border: 1px solid #61AF49;
    border-radius: 16px;
    padding: 20px;
    flex: 1;
    min-width: 280px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
  }

  .card h2 {
    font-size: 1.6rem;
    color: #f8fafc;
    border-bottom: 2px solid #334155;
    padding-bottom: 10px;
    margin-bottom: 15px;
    text-align: center;
  }

  ol {
    list-style: none;
  }

  li {
    background: #0f172a;
    border: 1px solid #334155;
    margin-bottom: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
  }

  li:first-child {
    border-color: #f59e0b;
    background: linear-gradient(135deg, #1e293b 0%, #291e11 100%);
  }

  .pos {
    font-weight: 800;
    font-size: 1.4rem;
    margin-right: 12px;
    min-width: 40px;
  }

  .pos-1 { color: #f59e0b; }
  .pos-2 { color: #94a3b8; }
  .pos-3 { color: #b45309; }

  .nome-projeto {
    font-weight: 600;
    color: #f1f5f9;
    word-break: break-word;
  }

  footer {
    width: 100%;
    max-width: 1200px;
    margin-top: 20px;
    text-align: center;
  }

  #total-votos {
    background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
    color: #ffffff;
    font-size: 2rem;
    font-weight: 700;
    padding: 16px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(2, 132, 199, 0.3);
  }
</style>
</head>
